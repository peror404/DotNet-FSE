<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: rgb(91, 91, 160);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: rgb(178, 178, 96);
            font-weight: bold;
        }

        .banner {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="welcomeBanner">
        <h1>Welcome to the Website!</h1>
        <p class="highlight">
            We are glad to have you here.
        </p>
        <p>
            Special Offer:
            <span style="color:rgb(194, 33, 33); font-weight:bold;">
                Free registration for first 50 users!
            </span>
        </p>
    </div>
</body>

</html>
