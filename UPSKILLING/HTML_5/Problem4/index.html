<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>
        .gallery-img {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            border-collapse: collapse;
            margin: auto;
            background-color: #9ad3dd;
        }

        td {
            padding: 10px;
            text-align: center;
            color: black;
        }

        body {
            font-family: Arial, sans-serif;
            color: white;
            background-color: #030303;
        }
    </style>
</head>
<body>

    <h1 align="center">Community Event Gallery</h1>

    <table border="1">
        <tr>
            <td>
                <img src="dance.jpg" alt="Music Event"
                     title="Music Festival"
                     class="gallery-img">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="art.jpg" alt="Food Event"
                     title="Food Carnival"
                     class="gallery-img">
                <p>Food Carnival</p>
            </td>

            <td>
                <img src="dance.jpg" alt="Sports Event"
                     title="Sports Meet"
                     class="gallery-img">
                <p>Sports Meet</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="art.jpg" alt="Art Event"
                     title="Art Exhibition"
                     class="gallery-img">
                <p>Art Exhibition</p>
            </td>

            <td>
                <img src="dance.jpg" alt="Dance Event"
                     title="Dance Show"
                     class="gallery-img">
                <p>Dance Show</p>
            </td>

            <td>
                <img src="art.jpg" alt="Workshop"
                     title="Coding Workshop"
                     class="gallery-img">
                <p>Coding Workshop</p>
            </td>
        </tr>
    </table>

</body>
</html>
