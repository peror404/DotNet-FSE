<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debugging Example</title>

    <script>

        let number1 = 10;
        let number2 = 20;

        console.log("Number 1 =", number1);
        console.log("Number 2 =", number2);

        let sum = number1 + number2;

        console.log("Sum =", sum);

        function showMessage() {

            debugger; // breakpoint

            alert("Check Console and Breakpoint");
        }

    </script>
</head>
<body>

    <h1 id="heading">
        Chrome DevTools Practice
    </h1>

    <button onclick="showMessage()">
        Click Me
    </button>

</body>
</html>
