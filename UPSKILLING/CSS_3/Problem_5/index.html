<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typography Example</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
        }

        h1 {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        h2 {
            font-size: 28px;
            font-style: italic;
            color: darkblue;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            text-align: justify;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <h1>Community Events</h1>

    <h2>Welcome Message</h2>

    <p>
        This portal provides information about local
        events, activities, workshops, and community
        programs for all residents.
    </p>

</body>
</html>
